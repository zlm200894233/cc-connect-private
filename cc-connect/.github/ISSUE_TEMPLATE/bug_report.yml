name: Bug Report
description: Report a bug to help us improve cc-connect
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us understand and reproduce the issue.

  - type: input
    id: version
    attributes:
      label: cc-connect Version
      description: Run `cc-connect --version` to get the version.
      placeholder: "e.g. v0.3.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Agent Type
      description: Which AI agent are you using?
      options:
        - Claude Code
        - Codex (OpenAI)
        - Cursor Agent
        - Gemini CLI
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which messaging platform(s) are involved?
      multiple: true
      options:
        - Feishu (Lark)
        - DingTalk
        - Telegram
        - Slack
        - Discord
        - LINE
        - WeChat Work (企业微信)
        - QQ (NapCat/OneBot)
        - N/A
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - npm (npm install -g cc-connect)
        - Binary download (GitHub Releases)
        - Build from source
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure config.toml with ...
        2. Run `cc-connect`
        3. Send message '...' in the chat
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration (config.toml)
      description: |
        Please share the relevant parts of your config.toml (remove sensitive info like tokens/keys).
      render: toml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information about the problem.
    validations:
      required: false
